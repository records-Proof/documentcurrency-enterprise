name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        working-directory: apps/web
        run: npm ci || npm install
      - name: Build
        working-directory: apps/web
        run: npm run build
